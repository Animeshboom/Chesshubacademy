version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chesshub_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=chesshub
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    restart: always

  web:
    build: .
    container_name: chesshub_backend
    command: python manage.py migrate && python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-insecure-docker-key-2026
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - DB_NAME=chesshub
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
